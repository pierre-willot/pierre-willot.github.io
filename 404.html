<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | Pierre Willot</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .error-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        .error-message {
            color: #666;
            font-size: 20px;
            margin-bottom: 30px;
        }
        .error-img {
            width: 200px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container error-container">
        <img src="img/404.png" alt="404" class="error-img">
        
        <h1>Oops! You've drifted away.</h1>
        <p class="error-message">This page seems to have vanished into another world.</p>
        
        <div class="links">
            <a href="https://pierrewillot.com" class="link-button website">
                <i class="fas fa-home"></i> Back to Home
            </a>
        </div>
        
        <p class="footer">© Pierre Willot 2026</p>
    </div>
</body>
</html>
