<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pierre Willot | Illustrator</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <div class="language-selector" id="languageSelector">
            <div class="language-btn">
                <i class="fas fa-globe"></i>
                <span class="current-language">Français</span>
                <i class="fas fa-chevron-down" style="margin-left: 8px; font-size: 12px;"></i>
            </div>
            <div class="language-options">
                <div class="language-option" data-lang="en">
                    <i class="fas fa-check" style="visibility: hidden;"></i> English
                </div>
                <div class="language-option active" data-lang="fr">
                    <i class="fas fa-check"></i> Français
                </div>
            </div>
        </div>
        
        <div class="profile">
            <img src="img/profile.jpg" alt="Pierre Willot" class="profile-img">
            <h1>Pierre Willot</h1>
            <p class="bio" id="bio"></p>
        </div>
        
        <div class="links">
            <!-- <a href="https://pierrewillot.com" class="link-button website" target="_blank">
                <i class="fas fa-globe"></i> Website
            </a> -->
            <a href="https://instagram.com/p.willot" class="link-button instagram" target="_blank">
                <i class="fab fa-instagram"></i> Instagram
            </a>
            <a href="https://www.artstation.com/pierrewillot" class="link-button artstation" target="_blank">
                <i class="fab fa-artstation"></i> ArtStation
            </a>
            <!-- <a href="portfolio/portfolio.pdf" class="link-button portfolio" target="_blank">
                <i class="fas fa-palette"></i> Portfolio.pdf
            </a> -->
            <a href="mailto:willotpierre@yahoo.fr" class="link-button email">
                <i class="far fa-envelope"></i> Contact
            </a>
        </div>
        
        <p class="footer">© Pierre Willot 2026</p>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
